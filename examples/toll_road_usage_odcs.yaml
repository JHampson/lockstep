# ODCS Contract compatible with DQX
# Format: OpenDataContractStandard (ODCS v3.0.x)

apiVersion: v3.0.0
kind: DataContract
id: toll-road-usage
name: toll_road_usage_contract
version: "1.0.0"
status: active

description:
  usage: Motorway toll road usage records capturing vehicle passages through toll points

tags:
  - domain:transport
  - classification:internal

# Server configuration per ODCS v3 spec
# For Databricks server type: catalog + schema are required fields
servers:
  - server: databricks-field-eng
    type: databricks
    host: e2-demo-field-eng.cloud.databricks.com
    catalog: users
    schema: jason_hampson

schema:
  - name: toll_road_usage
    physicalType: table
    description: Toll road usage transaction records

    properties:
      - name: transaction_id
        logicalType: string
        description: Unique identifier for the toll transaction (UUID)
        required: true
        primaryKey: true

      - name: passage_timestamp
        logicalType: timestamp
        description: Timestamp when the vehicle passed through the toll point
        required: true

      - name: toll_point_id
        logicalType: string
        description: Unique identifier for the toll collection point
        required: true

      - name: motorway_code
        logicalType: string
        description: Code identifying the motorway
        required: true
        logicalTypeOptions:
          pattern: '^(M[0-9]+|A[0-9]+\\(M\\))$'

      - name: direction
        logicalType: string
        description: Direction of travel
        required: true

      - name: lane_number
        logicalType: integer
        description: Lane number at the toll point
        required: true
        logicalTypeOptions:
          minimum: 1
          maximum: 10

      - name: vehicle_registration
        logicalType: string
        description: Vehicle registration plate
        required: false

      - name: vehicle_class
        logicalType: string
        description: Vehicle classification for toll pricing
        required: true

      - name: axle_count
        logicalType: integer
        description: Number of axles detected
        required: false
        logicalTypeOptions:
          minimum: 1
          maximum: 12

      - name: vehicle_height_cm
        logicalType: integer
        description: Vehicle height in centimetres
        required: false
        logicalTypeOptions:
          minimum: 50
          maximum: 500

      - name: toll_amount
        logicalType: number
        description: Toll amount charged
        required: true
        logicalTypeOptions:
          minimum: 0

      - name: currency_code
        logicalType: string
        description: ISO 4217 currency code
        required: true
        logicalTypeOptions:
          pattern: '^[A-Z]{3}$'

      - name: payment_method
        logicalType: string
        description: Method of payment
        required: true

      - name: account_id
        logicalType: string
        description: Customer account ID
        required: false

      - name: tag_id
        logicalType: string
        description: Electronic toll tag identifier
        required: false

      - name: detection_method
        logicalType: string
        description: How the vehicle was detected
        required: true

      - name: confidence_score
        logicalType: number
        description: Confidence score of vehicle detection
        required: false
        logicalTypeOptions:
          minimum: 0
          maximum: 1

      - name: entry_point_id
        logicalType: string
        description: Entry point for distance-based tolling
        required: false

      - name: exit_point_id
        logicalType: string
        description: Exit point for distance-based tolling
        required: false

      - name: journey_distance_km
        logicalType: number
        description: Distance travelled in kilometres
        required: false
        logicalTypeOptions:
          minimum: 0

      - name: discount_applied
        logicalType: number
        description: Discount amount applied
        required: false
        logicalTypeOptions:
          minimum: 0

      - name: discount_type
        logicalType: string
        description: Type of discount applied
        required: false

      - name: vat_amount
        logicalType: number
        description: VAT/tax amount
        required: false
        logicalTypeOptions:
          minimum: 0

      - name: toll_plaza_name
        logicalType: string
        description: Name of the toll plaza
        required: false

      - name: image_reference
        logicalType: string
        description: Reference to captured image
        required: false

      - name: created_at
        logicalType: timestamp
        description: When the record was created
        required: true

      - name: updated_at
        logicalType: timestamp
        description: When the record was last updated
        required: false

    # Explicit DQX quality rules
    quality:
      - type: custom
        engine: dqx
        description: Toll amount must be non-negative
        implementation:
          name: toll_amount_non_negative
          criticality: error
          check:
            function: sql_expression
            arguments:
              expression: "toll_amount >= 0"

      - type: custom
        engine: dqx
        description: VAT should not exceed toll amount
        implementation:
          name: vat_not_exceeds_toll
          criticality: error
          check:
            function: sql_expression
            arguments:
              expression: "vat_amount IS NULL OR vat_amount <= toll_amount"

      - type: custom
        engine: dqx
        description: Tag payments require tag_id
        implementation:
          name: tag_payment_has_tag_id
          criticality: error
          check:
            function: sql_expression
            arguments:
              expression: "payment_method != 'tag' OR tag_id IS NOT NULL"

      - type: custom
        engine: dqx
        description: Account payments require account_id
        implementation:
          name: account_payment_has_account_id
          criticality: error
          check:
            function: sql_expression
            arguments:
              expression: "payment_method != 'account' OR account_id IS NOT NULL"

      - type: custom
        engine: dqx
        description: Confidence score must be 0-1
        implementation:
          name: confidence_score_range
          criticality: warn
          check:
            function: sql_expression
            arguments:
              expression: "confidence_score IS NULL OR (confidence_score >= 0 AND confidence_score <= 1)"

      - type: custom
        engine: dqx
        description: Passage timestamp should not be in future
        implementation:
          name: passage_not_future
          criticality: error
          check:
            function: sql_expression
            arguments:
              expression: "passage_timestamp <= current_timestamp()"

